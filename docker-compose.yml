services:
  mysql:
    image: mysql:8.0.45
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command: --port=${DB_PORT}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-P", "${DB_PORT}", "-u", "root", "-p${DB_PASSWORD}"]
      timeout: 20s
      retries: 10
    networks:
      - cloudstore-network

  server:
    build:
      context: ./src/main/java/com/cloudstore/server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:9999:9999"
    networks:
      - cloudstore-network
    restart: unless-stopped

  redis:
    image: redis:8.6.1   
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"   
    volumes:
      - redis_data:/data
    networks:
      - cloudstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./src/client
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_HOST: server
      BACKEND_PORT: 9999
    depends_on:
      - server
    ports:
      - "127.0.0.1:8501:8501"
    networks:
      - cloudstore-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis_data:

networks:
  cloudstore-network:
    driver: bridge