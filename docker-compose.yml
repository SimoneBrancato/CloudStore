services:
  mysql:
    image: mysql:8.0.45
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10
    networks:
      - cloudstore-network

  server:
    build:
      context: ./src/server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:9999:9999"
    networks:
      - cloudstore-network
    restart: unless-stopped

  client:
    build:
      context: ./src/client
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_HOST: server
      BACKEND_PORT: 9999
    depends_on:
      - server
    ports:
      - "127.0.0.1:8501:8501"
    networks:
      - cloudstore-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  cloudstore-network:
    driver: bridge